<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 — 工作回報系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      color: #1a202c;
    }

    /* ── 頂部導覽 ── */
    nav {
      background: #2d3748;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    nav h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; }
    nav .nav-right { display: flex; align-items: center; gap: 16px; }
    nav a {
      color: #a0aec0;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }

    /* ── 連線狀態 ── */
    .status-bar {
      background: #1a202c;
      color: #a0aec0;
      font-size: 0.78rem;
      padding: 6px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot.green  { background: #48bb78; }
    .dot.red    { background: #fc8181; }
    .dot.yellow { background: #f6ad55; }

    /* ── 主內容 ── */
    .main { display: flex; min-height: calc(100vh - 56px); }

    /* ── 左側日期面板 ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      overflow-y: auto;
      max-height: calc(100vh - 56px);
      position: sticky;
      top: 56px;
    }
    .sidebar-header {
      padding: 16px;
      background: #edf2f7;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .date-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f7fafc;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .date-item:hover { background: #ebf8ff; }
    .date-item.active { background: #bee3f8; color: #2b6cb0; font-weight: 600; }
    .date-item .date-text { font-size: 0.9rem; }
    .date-item .badge {
      background: #4299e1;
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .date-item.active .badge { background: #2b6cb0; }
    .no-dates {
      padding: 24px 16px;
      color: #a0aec0;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ── 右側內容區 ── */
    .content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* ── 統計卡片 ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .stats-row { grid-template-columns: 1fr; } }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      text-align: center;
    }
    .stat-card .num {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3748;
    }
    .stat-card .label {
      font-size: 0.82rem;
      color: #718096;
      margin-top: 4px;
    }

    /* ── 日期標題 ── */
    .date-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .date-heading h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2d3748;
    }
    .count-chip {
      background: #4299e1;
      color: #fff;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* ── 回報卡片 ── */
    .report-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      border-left: 4px solid #4299e1;
    }
    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .report-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2d3748;
    }
    .report-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .meta-chip {
      background: #edf2f7;
      color: #4a5568;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
    }
    .meta-chip.time { background: #e9d8fd; color: #553c9a; }
    .meta-chip.location { background: #fefcbf; color: #744210; }

    .report-fields { display: grid; gap: 10px; }
    .field-row { display: grid; grid-template-columns: 72px 1fr; gap: 10px; align-items: start; }
    .field-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #718096;
      padding-top: 2px;
    }
    .field-value {
      font-size: 0.9rem;
      color: #2d3748;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 照片縮圖 */
    .photos-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .photo-thumb {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #e2e8f0;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .photo-thumb:hover { transform: scale(1.05); border-color: #4299e1; }

    /* 空狀態 */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: #a0aec0;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    /* 載入中 */
    .loading {
      text-align: center;
      padding: 40px;
      color: #718096;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #e2e8f0;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 首頁提示 */
    .welcome {
      text-align: center;
      padding: 60px 24px;
    }
    .welcome .icon { font-size: 3.5rem; margin-bottom: 16px; }
    .welcome h2 { font-size: 1.3rem; color: #2d3748; margin-bottom: 8px; }
    .welcome p { color: #718096; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- 頂部導覽 -->
  <nav>
    <h1>📊 工作回報後台</h1>
    <div class="nav-right">
      <span id="sheets-status" style="font-size:0.8rem;">檢查 Google Sheets...</span>
      <a href="/">← 前往填寫表單</a>
    </div>
  </nav>

  <div class="main">
    <!-- 左側日期清單 -->
    <aside class="sidebar">
      <div class="sidebar-header">📅 日期列表</div>
      <div id="date-list"><div class="no-dates">載入中...</div></div>
    </aside>

    <!-- 右側內容 -->
    <main class="content" id="main-content">
      <!-- 統計 -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="num" id="stat-total">—</div>
          <div class="label">總回報數</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-days">—</div>
          <div class="label">有記錄天數</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-latest">—</div>
          <div class="label">最新回報日期</div>
        </div>
      </div>

      <!-- 預設提示 -->
      <div class="welcome" id="welcome-msg">
        <div class="icon">👈</div>
        <h2>請選擇左側日期</h2>
        <p>點擊左側的日期，即可查看當天所有回報記錄</p>
      </div>

      <!-- 動態內容 -->
      <div id="reports-area" style="display:none;"></div>
    </main>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="照片" />
  </div>

  <script>
    // ── 初始化 ──────────────────────────────────────
    async function init() {
      await Promise.all([loadStats(), loadDates(), checkSheets()]);
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const d = await res.json();
        document.getElementById('stat-total').textContent   = d.total ?? 0;
        document.getElementById('stat-days').textContent    = d.days  ?? 0;
        document.getElementById('stat-latest').textContent  = d.latest_date ? formatDate(d.latest_date) : '無';
      } catch (e) { console.error(e); }
    }

    async function loadDates() {
      try {
        const res  = await fetch('/api/dates');
        const data = await res.json();
        const list = document.getElementById('date-list');

        if (!data.dates || data.dates.length === 0) {
          list.innerHTML = '<div class="no-dates">尚無回報記錄</div>';
          return;
        }

        list.innerHTML = data.dates.map(date => `
          <div class="date-item" data-date="${date}" onclick="loadReports('${date}')">
            <span class="date-text">${formatDate(date)}</span>
            <span class="badge" id="badge-${date}">...</span>
          </div>
        `).join('');

        // 取得各日期回報數
        data.dates.forEach(async date => {
          try {
            const r = await fetch(`/api/reports/${date}`);
            const rd = await r.json();
            const badge = document.getElementById(`badge-${date}`);
            if (badge) badge.textContent = rd.count;
          } catch(e) {}
        });
      } catch (e) {
        document.getElementById('date-list').innerHTML = '<div class="no-dates">載入失敗</div>';
      }
    }

    async function loadReports(date) {
      // 更新左側選取狀態
      document.querySelectorAll('.date-item').forEach(el => {
        el.classList.toggle('active', el.dataset.date === date);
      });

      const area = document.getElementById('reports-area');
      const welcome = document.getElementById('welcome-msg');
      welcome.style.display = 'none';
      area.style.display = 'block';
      area.innerHTML = '<div class="loading"><div class="spinner"></div><br>載入中...</div>';

      try {
        const res = await fetch(`/api/reports/${date}`);
        const data = await res.json();
        renderReports(data.date, data.reports);
      } catch (e) {
        area.innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>載入失敗，請重新整理</p></div>';
      }
    }

    function renderReports(date, reports) {
      const area = document.getElementById('reports-area');
      if (!reports || reports.length === 0) {
        area.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>這天沒有回報記錄</p></div>';
        return;
      }

      const heading = `
        <div class="date-heading">
          <h2>📅 ${formatDate(date)}</h2>
          <span class="count-chip">${reports.length} 筆回報</span>
        </div>`;

      const cards = reports.map((r, i) => {
        const photosHtml = r.photos && r.photos.length > 0
          ? `<div class="photos-row">${r.photos.map(p => `
              <img class="photo-thumb" src="/uploads/${p}" alt="照片"
                   onclick="openLightbox('/uploads/${p}')" />`).join('')}</div>`
          : '<span style="color:#a0aec0;font-size:0.85rem;">（無照片）</span>';

        return `
          <div class="report-card">
            <div class="report-header">
              <span class="report-name">👤 ${escHtml(r.name)}</span>
              <div class="report-meta">
                <span class="meta-chip time">🕐 ${r.start_time} — ${r.end_time}</span>
                <span class="meta-chip location">📍 ${escHtml(r.location)}</span>
              </div>
            </div>
            <div class="report-fields">
              <div class="field-row">
                <span class="field-label">原因</span>
                <span class="field-value">${escHtml(r.reason)}</span>
              </div>
              <div class="field-row">
                <span class="field-label">解決方法</span>
                <span class="field-value">${escHtml(r.solution)}</span>
              </div>
              <div class="field-row">
                <span class="field-label">照片</span>
                <div>${photosHtml}</div>
              </div>
            </div>
          </div>`;
      }).join('');

      area.innerHTML = heading + cards;
    }

    async function checkSheets() {
      try {
        const res = await fetch('/api/sheets_status');
        const d = await res.json();
        const el = document.getElementById('sheets-status');
        if (d.connected) {
          el.innerHTML = '<span style="color:#68d391;">● Google Sheets 已連線</span>';
        } else {
          el.innerHTML = `<span style="color:#fc8181;">● Sheets 未連線：${d.reason}</span>`;
        }
      } catch(e) {}
    }

    // ── 工具函式 ──────────────────────────────────────
    function formatDate(dateStr) {
      // 2026-03-30 → 2026/03/30 (週一)
      const [y, m, day] = dateStr.split('-');
      const d = new Date(+y, +m - 1, +day);
      const week = ['日','一','二','三','四','五','六'][d.getDay()];
      return `${y}/${m}/${day}（週${week}）`;
    }

    function escHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Lightbox ──────────────────────────────────────
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lightbox-img').src = '';
    }
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });

    // ── 啟動 ──────────────────────────────────────────
    init();

    // 每 30 秒自動刷新統計與日期
    setInterval(() => { loadStats(); loadDates(); }, 30000);
  </script>
</body>
</html>
